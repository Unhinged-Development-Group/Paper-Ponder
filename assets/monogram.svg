<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&amp;display=swap');
      
      .bg-circle { 
        fill: #fffaf5; /* Faint orange-50 tint */
        stroke: #ffedd5; 
        stroke-width: 2; 
      }
      .dashed-circle { 
        fill: none; 
        stroke: #fed7aa; 
        stroke-width: 1.5; 
        stroke-dasharray: 6 6; 
      }
      .serif-p { 
        font-family: 'Times New Roman', Times, serif; 
        font-size: 96px; 
        font-weight: 500; 
        fill: #7c2d12; 
        text-anchor: middle; 
      }
      .ampersand { 
        font-family: 'Dancing Script', cursive; 
        font-size: 120px; 
        fill: #f97316; 
        text-anchor: middle; 
      }
    </style>
    <filter id="subtle-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Outer Artisan Circle -->
  <circle cx="128" cy="128" r="120" class="bg-circle" />
  
  <!-- Dashed Inner Stitching -->
  <circle cx="128" cy="128" r="108" class="dashed-circle" />
  
  <!-- The Tightly Spaced P's -->
  <text x="94" y="162" class="serif-p">P</text>
  <text x="162" y="162" class="serif-p">P</text>
  
  <!-- The Flowing Ampersand -->
  <text x="128" y="172" class="ampersand" transform="rotate(-12, 128, 128)" filter="url(#subtle-shadow)">&amp;</text>
</svg>