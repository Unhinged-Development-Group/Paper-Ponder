<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Badges</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .b { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; padding: 7px 14px; border-radius: 999px; box-shadow: var(--shadow-xs); }
  .a { background: #ffedd5; color: #7c2d12; }
  .n { background: #f5f5f4; color: #78716c; }
  .o { background: #fff; color: #44403c; border: 1px solid var(--border); }
  .d { background: #1c1917; color: #fb923c; }
  .acc { background: #fb923c; color: #1c1917; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
</style></head>
<body>
  <div class="lbl">Status badges</div>
  <div class="row">
    <span class="b a">New Arrival</span>
    <span class="b n">Sold Out</span>
    <span class="b o">Limited Ed.</span>
    <span class="b acc">Restocked</span>
    <span class="b d">No. 04</span>
  </div>
  <div class="lbl">Edition / Spec labels</div>
  <div class="row">
    <span class="b o">A5 Size</span>
    <span class="b o">120 gsm</span>
    <span class="b o">Lay-Flat</span>
    <span class="b o">Dot Grid</span>
    <span class="b o">Hand-Stitched</span>
  </div>
</body></html>
