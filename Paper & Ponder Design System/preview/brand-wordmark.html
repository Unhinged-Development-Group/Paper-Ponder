<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Wordmark</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; background: #fff7ed; }
  .wrap { padding: 36px 28px; text-align: center; position: relative; overflow: hidden; }
  .pattern { position: absolute; inset: 0; background-image: radial-gradient(#fb923c 0.5px, transparent 0.5px), radial-gradient(#fb923c 0.5px, #fff7ed 0.5px); background-size: 20px 20px; background-position: 0 0, 10px 10px; opacity: 0.4; pointer-events: none; }
  .eb { position: relative; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(124,45,18,0.5); font-weight: 700; margin-bottom: 16px; }
  .word { position: relative; font-family: var(--font-script); font-size: 92px; color: #7c2d12; line-height: 1; }
  .amp { color: #fb923c; }
</style></head>
<body>
  <div class="wrap">
    <div class="pattern"></div>
    <div class="eb">Primary Wordmark · Dancing Script</div>
    <div class="word">Paper <span class="amp">&amp;</span> Ponder</div>
  </div>
</body></html>
