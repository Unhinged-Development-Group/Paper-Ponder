<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Stone Neutrals</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
  .chip { height: 70px; border-radius: 8px; border: 1px solid var(--border-soft); }
  .num { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); margin-top: 6px; text-align: center; }
  .note { font-size: 12px; color: var(--fg-2); margin-top: 14px; line-height: 1.55; }
</style></head>
<body>
  <div class="eyebrow" style="margin-bottom:12px">Stone · Warm Neutrals</div>
  <div class="grid">
    <div><div class="chip" style="background:#fafaf9"></div><div class="num">50</div></div>
    <div><div class="chip" style="background:#f5f5f4"></div><div class="num">100</div></div>
    <div><div class="chip" style="background:#e7e5e4"></div><div class="num">200</div></div>
    <div><div class="chip" style="background:#d6d3d1"></div><div class="num">300</div></div>
    <div><div class="chip" style="background:#a8a29e"></div><div class="num">400</div></div>
    <div><div class="chip" style="background:#78716c"></div><div class="num">500</div></div>
    <div><div class="chip" style="background:#57534e"></div><div class="num">600</div></div>
    <div><div class="chip" style="background:#44403c"></div><div class="num">700</div></div>
    <div><div class="chip" style="background:#292524"></div><div class="num">800</div></div>
    <div><div class="chip" style="background:#1c1917"></div><div class="num">900</div></div>
  </div>
  <div class="note">Warm-neutral only — never cool gray. Used for borders, dividers, body type. Stone-200 is the canonical 1px card border.</div>
</body></html>
