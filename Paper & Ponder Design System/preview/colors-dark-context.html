<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Dark Context</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .panel { background: #1c1917; padding: 28px; position: relative; overflow: hidden; min-height: 220px; }
  .glow { position:absolute; right:-40px; top:-40px; width:200px; height:200px; background:#7c2d12; border-radius: 50%; opacity:0.35; filter: blur(40px); }
  .eb { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #fb923c; font-weight:700; }
  .h { color: #ffedd5; font-size: 22px; font-weight: 300; margin: 14px 0 8px; }
  .p { color: rgba(255,237,213,0.7); font-size: 13px; line-height: 1.6; max-width: 460px; }
  .btn { margin-top: 18px; display: inline-block; padding: 10px 18px; border: 1px solid #fb923c; color: #fb923c; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; font-weight: 700; border-radius: 8px; }
</style></head>
<body>
  <div class="panel">
    <div class="glow"></div>
    <div style="position:relative">
      <div class="eb">Midnight Context</div>
      <div class="h">Swap Alabaster → Charcoal.</div>
      <div class="p">Use Sand for body type to ease eye strain. Emphasis comes from Terracotta. A single soft radial glow of Deep Clay is the only "gradient" allowed in the system.</div>
      <div class="btn">Night Mode</div>
    </div>
  </div>
</body></html>
