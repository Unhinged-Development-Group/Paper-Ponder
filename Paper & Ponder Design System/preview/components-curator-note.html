<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Curator's Note</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .note { background: #fafaf9; border-left: 2px solid #7c2d12; padding: 14px 16px; border-radius: 0 10px 10px 0; box-shadow: var(--shadow-sm); }
  .head { display: flex; align-items: center; gap: 8px; }
  .head svg { width: 14px; height: 14px; stroke: #7c2d12; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .title { font-size: 12px; font-weight: 600; color: var(--ink); }
  .body { font-size: 12px; color: var(--fg-2); line-height: 1.6; margin-top: 4px; padding-left: 22px; }
  .alt { background: #fff7ed; border-left-color: #fb923c; margin-top: 14px; }
  .alt svg { stroke: #c2410c; }
  .alt .title { color: #7c2d12; }
</style></head>
<body>
  <div class="eyebrow" style="margin-bottom:12px">Curator's note · Inline alert pattern</div>
  <div class="note">
    <div class="head">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8.01"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
      <div class="title">Curator's Note</div>
    </div>
    <div class="body">The Obsidian Journal features hand-stitched binding that requires gentle break-in over the first week of use.</div>
  </div>
  <div class="note alt">
    <div class="head">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8.01"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
      <div class="title">In stock — limited run</div>
    </div>
    <div class="body">Edition 04 ships within five working days from our bindery in Bristol.</div>
  </div>
</body></html>
