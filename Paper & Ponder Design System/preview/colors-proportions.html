<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Color Proportions</title>
<link rel="stylesheet" href="_base.css">
<style>
  .bar { height: 44px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-inner); display: flex; }
  .seg { height: 100%; }
  .legend { display:flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 10px; }
  .note { font-size: 12px; color: var(--fg-2); line-height: 1.6; margin-top: 14px; }
</style></head>
<body>
  <div class="eyebrow" style="margin-bottom:12px">Recommended Proportions</div>
  <div class="bar">
    <div class="seg" style="background:#fafaf9;width:60%"></div>
    <div class="seg" style="background:#ffedd5;width:25%"></div>
    <div class="seg" style="background:#1c1917;width:10%"></div>
    <div class="seg" style="background:#7c2d12;width:5%"></div>
  </div>
  <div class="legend">
    <span>Alabaster · 60%</span>
    <span>Sand · 25%</span>
    <span>Charcoal · 10%</span>
    <span>Clay · 5%</span>
  </div>
  <div class="note">Backgrounds dominate. Type grounds. Clay punches. Reserve Deep Clay &amp; Terracotta for deliberate accents — never let them flood a layout.</div>
</body></html>
