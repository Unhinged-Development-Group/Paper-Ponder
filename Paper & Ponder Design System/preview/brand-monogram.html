<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Monogram</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .cell { aspect-ratio: 1; border: 1px solid var(--border-soft); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); position: relative; }
  .cell.light { background: rgba(255,237,213,0.3); }
  .cell.warm { background: #ffedd5; }
  .cell.dark { background: #1c1917; }
  .mono { position: relative; width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .ring { position: absolute; inset: 8px; border-radius: 50%; border: 1px dashed rgba(251,146,60,0.5); }
  .pp { display: flex; gap: 6px; position: relative; align-items: center; }
  .p { font-family: serif; font-weight: 500; font-size: 52px; color: #7c2d12; line-height: 1; }
  .amp { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-46%) rotate(-12deg); font-family: var(--font-script); font-size: 62px; color: #fb923c; line-height: 1; }
  .dark .p { color: #fdba74; }
  .dark .amp { color: #fb923c; }
  .lbl { position: absolute; top: 8px; left: 12px; font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-3); font-weight: 700; }
  .dark .lbl { color: rgba(255,237,213,0.5); }
</style></head>
<body>
  <div class="grid">
    <div class="cell light">
      <span class="lbl">On Alabaster</span>
      <div class="mono"><div class="ring"></div><div class="pp"><span class="p">P</span><span class="p">P</span><span class="amp">&amp;</span></div></div>
    </div>
    <div class="cell warm">
      <span class="lbl">On Sand</span>
      <div class="mono"><div class="ring"></div><div class="pp"><span class="p">P</span><span class="p">P</span><span class="amp">&amp;</span></div></div>
    </div>
    <div class="cell dark">
      <span class="lbl">On Charcoal</span>
      <div class="mono"><div class="ring" style="border-color:rgba(251,146,60,0.4)"></div><div class="pp"><span class="p">P</span><span class="p">P</span><span class="amp">&amp;</span></div></div>
    </div>
  </div>
</body></html>
