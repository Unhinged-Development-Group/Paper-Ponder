<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <style>
      @font-face {
        font-family: 'Dancing Script';
        src: url('../fonts/DancingScript-Regular.ttf');
      }
      .bg-circle   { fill: rgba(255,237,213,0.3); }
      .dashed-circle { fill: none; stroke: rgba(251,146,60,0.5); stroke-width: 1.5; stroke-dasharray: 5 5; }
      .serif-p  { font-family: Georgia, 'Times New Roman', serif; font-weight: 500; font-size: 90px; fill: #7c2d12; text-anchor: middle; }
      .ampersand { font-family: 'Dancing Script', cursive; font-size: 108px; fill: #fb923c; text-anchor: middle; }
    </style>
    <filter id="subtle-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="120" class="bg-circle"/>
  <circle cx="128" cy="128" r="108" class="dashed-circle"/>
  <text x="94"  y="164" class="serif-p">P</text>
  <text x="162" y="164" class="serif-p">P</text>
  <text x="128" y="162" class="ampersand" transform="rotate(-12, 128, 128)" filter="url(#subtle-shadow)">&amp;</text>
</svg>
