<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Corner Radii</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .b { aspect-ratio: 1; background: #fff7ed; border: 1px solid #fed7aa; }
  .n { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.18em; margin-top: 8px; text-align: center; font-weight: 700; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--ink); text-align: center; margin-top: 2px; }
</style></head>
<body>
  <div class="eyebrow" style="margin-bottom:14px">Radius scale · Cards 16/24, Buttons 12, Pills full</div>
  <div class="grid">
    <div><div class="b" style="border-radius:4px"></div><div class="n">xs</div><div class="px">4</div></div>
    <div><div class="b" style="border-radius:8px"></div><div class="n">sm</div><div class="px">8</div></div>
    <div><div class="b" style="border-radius:12px"></div><div class="n">md</div><div class="px">12</div></div>
    <div><div class="b" style="border-radius:16px"></div><div class="n">lg</div><div class="px">16</div></div>
    <div><div class="b" style="border-radius:24px"></div><div class="n">xl</div><div class="px">24</div></div>
    <div><div class="b" style="border-radius:9999px"></div><div class="n">pill</div><div class="px">∞</div></div>
  </div>
</body></html>
