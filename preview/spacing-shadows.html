<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Shadows</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: #f5f5f4; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .card { background: #fff; aspect-ratio: 1; border-radius: 14px; border: 1px solid var(--border-soft); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .n { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.18em; font-weight: 700; }
  .label { font-size: 11px; color: var(--ink); margin-top: 2px; font-weight: 500; }
</style></head>
<body>
  <div class="eyebrow" style="margin-bottom:14px">Elevation · soft, warm-tinted</div>
  <div class="grid">
    <div class="card" style="box-shadow: 0 1px 1px rgba(28,25,23,0.04)"><div class="n">xs</div><div class="label">Subtle lift</div></div>
    <div class="card" style="box-shadow: 0 1px 2px rgba(28,25,23,0.06), 0 1px 1px rgba(28,25,23,0.04)"><div class="n">sm</div><div class="label">Card rest</div></div>
    <div class="card" style="box-shadow: 0 4px 12px -2px rgba(28,25,23,0.08), 0 2px 4px -2px rgba(28,25,23,0.05)"><div class="n">md</div><div class="label">Card hover</div></div>
    <div class="card" style="box-shadow: 0 16px 40px -12px rgba(28,25,23,0.18), 0 4px 8px -4px rgba(28,25,23,0.06)"><div class="n">lg</div><div class="label">Floating</div></div>
  </div>
</body></html>
