<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sans Specimen</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 28px; }
  .h { font-family: var(--font-sans); color: var(--ink); font-weight: 300; font-size: 44px; letter-spacing: -0.01em; line-height: 1.1; }
  .p { font-family: var(--font-sans); font-weight: 400; font-size: 14px; line-height: 1.65; color: var(--fg-2); margin-top: 14px; max-width: 540px; }
  .weights { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 16px; align-items: baseline; }
  .w { font-family: var(--font-sans); font-size: 18px; color: var(--ink); }
  .label { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.2em; display: block; margin-top: 4px; font-weight: 700; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--fg-3); margin-top: 18px; font-weight: 700; }
</style></head>
<body>
  <div class="h">Bound for considered thought.</div>
  <div class="p">Montserrat is the structural workhorse. Highly legible, geometric, and modern. It balances the flourishes of the wordmark with grounding stability.</div>
  <div class="weights">
    <div><span class="w" style="font-weight:300">Light 300</span><span class="label">Headings</span></div>
    <div><span class="w" style="font-weight:400">Regular 400</span><span class="label">Body</span></div>
    <div><span class="w" style="font-weight:500">Medium 500</span><span class="label">Emphasis</span></div>
    <div><span class="w" style="font-weight:600">Semi 600</span><span class="label">Rare</span></div>
  </div>
  <div class="meta">Montserrat · Avoid weights ≥ 700</div>
</body></html>
