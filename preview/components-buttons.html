<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px; padding: 12px 22px; border-radius: 10px; border: none; cursor: pointer; transition: all 300ms cubic-bezier(0.16,1,0.3,1); }
  .primary { background: #7c2d12; color: #fff7ed; box-shadow: var(--shadow-sm); }
  .primary.hover { background: #9a3412; }
  .outline { background: transparent; border: 1px solid #7c2d12; color: #7c2d12; }
  .outline.hover { background: #7c2d12; color: #fff7ed; }
  .ghost { background: transparent; color: #78716c; padding: 10px 0; letter-spacing: 0.2em; }
  .ghost.hover { color: #7c2d12; }
  .ghost svg { width: 14px; height: 14px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
</style></head>
<body>
  <div class="lbl">Primary · Rest / Hover</div>
  <div class="row">
    <button class="btn primary">Add to Cart</button>
    <button class="btn primary hover">Add to Cart</button>
  </div>
  <div class="lbl">Outline · Rest / Hover</div>
  <div class="row">
    <button class="btn outline">Read the Story</button>
    <button class="btn outline hover">Read the Story</button>
  </div>
  <div class="lbl">Tertiary link · Rest / Hover</div>
  <div class="row">
    <button class="btn ghost">Tertiary Link <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg></button>
    <button class="btn ghost hover">Tertiary Link <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:translateX(4px)"><path d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg></button>
  </div>
</body></html>
