<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Mono Labels</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row1 { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
  .pill { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; padding: 7px 14px; border-radius: 999px; }
  .a { background: #ffedd5; color: #7c2d12; }
  .b { background: #f5f5f4; color: #78716c; }
  .c { background: #fff; color: #44403c; border: 1px solid var(--border); }
  .d { background: #1c1917; color: #fb923c; }
  .big { font-family: var(--font-mono); font-weight: 700; font-size: 32px; letter-spacing: 0.12em; color: var(--ink); text-transform: uppercase; }
  .sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; color: var(--fg-2); text-transform: uppercase; margin-top: 4px; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--fg-3); margin-top: 18px; font-weight: 700; }
</style></head>
<body>
  <div class="row1">
    <span class="pill a">New Arrival</span>
    <span class="pill b">Sold Out</span>
    <span class="pill c">Limited Ed.</span>
    <span class="pill d">No. 04 | A5</span>
  </div>
  <div class="big">No.&nbsp;04 | A5 Size</div>
  <div class="sub">Handbound in the UK · Archival Quality</div>
  <div class="meta">Space Mono · Always uppercase · 0.2 – 0.3em tracking</div>
</body></html>
