<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Orange Ramp</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .sw { display:flex; flex-direction:column; align-items:stretch; }
  .chip { height: 90px; border-radius: 8px; border: 1px solid var(--border-soft); }
  .num { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); margin-top: 6px; text-align: center; text-transform: uppercase; }
</style></head>
<body>
  <div class="eyebrow" style="margin-bottom:12px">Clay Ramp · Orange</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#fff7ed"></div><div class="num">50</div></div>
    <div class="sw"><div class="chip" style="background:#ffedd5"></div><div class="num">100</div></div>
    <div class="sw"><div class="chip" style="background:#fed7aa"></div><div class="num">200</div></div>
    <div class="sw"><div class="chip" style="background:#fdba74"></div><div class="num">300</div></div>
    <div class="sw"><div class="chip" style="background:#fb923c"></div><div class="num">400</div></div>
    <div class="sw"><div class="chip" style="background:#f97316"></div><div class="num">500</div></div>
    <div class="sw"><div class="chip" style="background:#ea580c"></div><div class="num">600</div></div>
    <div class="sw"><div class="chip" style="background:#c2410c"></div><div class="num">700</div></div>
    <div class="sw"><div class="chip" style="background:#9a3412"></div><div class="num">800</div></div>
    <div class="sw"><div class="chip" style="background:#7c2d12"></div><div class="num">900</div></div>
    <div class="sw"><div class="chip" style="background:#431407"></div><div class="num">950</div></div>
  </div>
</body></html>
